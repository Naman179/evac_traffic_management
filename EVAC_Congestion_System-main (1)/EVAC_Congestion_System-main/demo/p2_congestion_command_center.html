<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVAC - Congestion Command Center</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #F4F6F8;
      --panel: #FFFFFF;
      --panel-2: #F7F9FB;
      --border: #D9E0E8;
      --border-soft: #E7ECF1;
      --text: #18212C;
      --text-dim: #5E6B7A;
      --text-faint: #8B96A5;
      --accent: #0B7A75;
      --accent-dim: rgba(11, 122, 117, 0.10);
      --risk-high: #C2413A;
      --risk-high-dim: rgba(194, 65, 58, 0.12);
      --risk-med: #B7791F;
      --risk-med-dim: rgba(183, 121, 31, 0.13);
      --risk-low: #2F855A;
      --risk-low-dim: rgba(47, 133, 90, 0.12);
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* App shell */
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .brand-mark {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 19px;
      letter-spacing: 0.2px;
      color: var(--text);
    }

    .brand-mark span {
      color: var(--accent);
    }

    .brand-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .brand-meta {
      font-size: 12px;
      color: var(--text-faint);
      font-family: var(--font-mono);
      margin-top: 2px;
    }

    .brand-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      text-align: left;
      min-width: 84px;
    }

    .stat-chip .v {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
      line-height: 1.1;
    }

    .stat-chip .l {
      font-size: 9.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
    }

    aside {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 18px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    aside::-webkit-scrollbar {
      width: 6px;
    }

    aside::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.9px;
      color: var(--text-faint);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* time band chips */
    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 7px 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      transition: all .15s ease;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .chip .peak-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--risk-med);
      box-shadow: 0 0 5px var(--risk-med);
    }

    .quick-btn {
      margin-top: 8px;
      width: 100%;
      font-family: var(--font-mono);
      font-size: 10.5px;
      padding: 7px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text-dim);
      cursor: pointer;
      transition: all .15s ease;
    }

    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    select {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 9px 10px;
      border-radius: 7px;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-dim);
    }

    .switch {
      width: 34px;
      height: 19px;
      border-radius: 20px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s ease;
    }

    .switch.on {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--text-faint);
      transition: all .15s ease;
    }

    .switch.on::after {
      left: 17px;
      background: var(--accent);
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .legend-grad {
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(90deg, #B7E4DF, #F2C879, #E88D73, #C2413A);
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9.5px;
      font-family: var(--font-mono);
      color: var(--text-faint);
    }

    .legend-risk {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .legend-risk-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10.5px;
      color: var(--text-dim);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .live-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      background: var(--panel-2);
      border: 1px solid var(--border-soft);
      border-radius: 7px;
      padding: 8px 10px;
    }

    .live-count b {
      color: var(--accent);
      font-size: 14px;
    }

    .live-count span {
      display: inline-block;
      margin-top: 4px;
      color: var(--text);
      line-height: 1.4;
    }

    /* corridor table */
    .corridor-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .corridor-row {
      background: var(--panel-2);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all .12s ease;
    }

    .corridor-row:hover {
      border-color: var(--accent);
      transform: translateX(2px);
    }

    .corridor-row.muted {
      opacity: 0.55;
    }

    .cr-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .cr-name {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text);
      text-transform: capitalize;
    }

    .cr-rank {
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--text-faint);
      margin-right: 6px;
    }

    .pill {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.4px;
    }

    .pill.HIGH {
      background: var(--risk-high-dim);
      color: var(--risk-high);
    }

    .pill.MEDIUM {
      background: var(--risk-med-dim);
      color: var(--risk-med);
    }

    .pill.LOW {
      background: var(--risk-low-dim);
      color: var(--risk-low);
    }

    .cr-bar-track {
      height: 4px;
      border-radius: 3px;
      background: var(--border-soft);
      overflow: hidden;
      margin-bottom: 5px;
    }

    .cr-bar-fill {
      height: 100%;
      border-radius: 3px;
    }

    .cr-meta {
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--text-faint);
      display: flex;
      justify-content: space-between;
    }

    .footnote {
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.6;
      color: var(--text-faint);
      border-top: 1px solid var(--border-soft);
      padding-top: 12px;
    }

    .footnote b {
      color: var(--text-dim);
    }

    .footnote::before {
      content: '// ';
      color: var(--accent);
    }

    /* Map */
    .map-wrap {
      position: relative;
      min-width: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #E7ECF1;
    }

    .leaflet-popup-content-wrapper {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(24, 33, 44, 0.18);
    }

    .leaflet-popup-tip {
      background: var(--panel);
    }

    .leaflet-popup-content {
      font-family: var(--font-body);
      font-size: 12.5px;
      margin: 11px 13px;
    }

    .popup-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13.5px;
      margin-bottom: 5px;
      text-transform: capitalize;
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-dim);
      padding: 2px 0;
    }

    .popup-row b {
      color: var(--text);
    }

    .leaflet-control-zoom {
      border: none !important;
    }

    .leaflet-control-zoom a {
      background: var(--panel) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
    }

    .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.82) !important;
      color: var(--text-faint) !important;
    }

    .leaflet-control-attribution a {
      color: var(--text-dim) !important;
    }

    /* Mobile */
    @media (max-width:900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      aside {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 42vh;
      }

      header {
        padding: 12px 16px;
      }

      .stat-chip {
        min-width: 70px;
        padding: 5px 9px;
      }
    }
  </style>
</head>

<body>

  <div class="app">
    <header>
      <div class="brand-col">
        <div class="brand">
          <span class="brand-mark">EVAC <span>Command Center</span></span>
        </div>
        <span class="brand-meta">Congestion heatmap and corridor risk from ASTraM records, Nov 2023 to Apr 2024,
          Bengaluru</span>
      </div>
      <div class="stat-row" id="statRow"></div>
    </header>

    <div class="layout">
      <aside>
        <div>
          <div class="section-label">Time band <span id="timeCount"
              style="color:var(--text-faint);font-weight:400;"></span></div>
          <div class="chip-grid" id="timeChips"></div>
          <button class="quick-btn" id="peakBtn">Show peak windows only: 4-7 AM and 7-11 PM</button>
        </div>

        <div>
          <div class="section-label">Cause</div>
          <select id="causeSelect"></select>
        </div>

        <div>
          <div class="section-label">Layers</div>
          <div class="toggle-row" style="margin-bottom:8px;">
            <span>Hotspot zones from DBSCAN</span>
            <div class="switch on" id="toggleHotspots"></div>
          </div>
          <div class="toggle-row">
            <span>Impact-weighted heat layer</span>
            <div class="switch on" id="toggleHeat"></div>
          </div>
        </div>

        <div>
          <div class="section-label">Legend</div>
          <div class="legend">
            <div class="legend-grad"></div>
            <div class="legend-labels"><span>low impact</span><span>high impact</span></div>
            <div class="legend-risk">
              <div class="legend-risk-item">
                <div class="legend-dot" style="background:var(--risk-high)"></div>HIGH risk zone
              </div>
              <div class="legend-risk-item">
                <div class="legend-dot" style="background:var(--risk-med)"></div>MEDIUM
              </div>
              <div class="legend-risk-item">
                <div class="legend-dot" style="background:var(--risk-low)"></div>LOW
              </div>
            </div>
          </div>
        </div>

        <div class="live-count" id="liveCount"></div>

        <div>
          <div class="section-label">Corridor risk ranking</div>
          <div class="corridor-list" id="corridorList"></div>
        </div>

        <div class="footnote" id="footnote"></div>
      </aside>

      <div class="map-wrap">
        <div id="map"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.0.1/leaflet-heat.js"></script>

  <script>
    const DATA = JSON.parse(document.getElementById('map-data').textContent);
    const PTS = DATA.points; // [lat, lon, cause, impact_weight, time_band, corridor, closure, impact_score]
    const SCHEMA = { lat: 0, lon: 1, cause: 2, weight: 3, band: 4, corridor: 5, closure: 6, score: 7 };

    const CAUSE_LABELS = {
      vehicle_breakdown: 'Vehicle breakdown', pot_holes: 'Potholes', construction: 'Construction',
      water_logging: 'Water logging', accident: 'Accident', tree_fall: 'Tree fall',
      congestion: 'Congestion', road_conditions: 'Road conditions', public_event: 'Public event',
      protest: 'Protest', procession: 'Procession', vip_movement: 'VIP movement',
      debris: 'Debris', 'fog / low visibility': 'Fog / low visibility', test_demo: 'Test / demo',
      others: 'Others'
    };

    const TIME_BANDS = [
      { id: 'early_morning', label: '4-7 AM', peak: true },
      { id: 'evening', label: '7-11 PM', peak: true },
      { id: 'late_night', label: '12-3 AM', peak: false },
      { id: 'off_peak', label: 'Off-peak', peak: false },
    ];

    const RISK_COLOR = { HIGH: '#C2413A', MEDIUM: '#B7791F', LOW: '#2F855A' };

    // State
    const state = {
      bands: new Set(['early_morning', 'evening']),
      cause: 'all',
      showHotspots: true,
      showHeat: true,
    };

    // Map setup
    const map = L.map('map', { zoomControl: true, attributionControl: true }).setView([12.96, 77.59], 11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    let heatLayer = null;
    let hotspotLayer = L.layerGroup().addTo(map);
    let highlightLayer = L.layerGroup().addTo(map);

    function buildHeat(points) {
      const heatPts = points.map(p => [p[SCHEMA.lat], p[SCHEMA.lon], Math.max(0.12, p[SCHEMA.weight])]);
      if (heatLayer) map.removeLayer(heatLayer);
      if (!state.showHeat) { heatLayer = null; return; }
      heatLayer = L.heatLayer(heatPts, {
        radius: 20, blur: 17, maxZoom: 15, max: 1.0,
        gradient: { 0.2: '#B7E4DF', 0.5: '#F2C879', 0.8: '#E88D73', 1.0: '#C2413A' }
      }).addTo(map);
    }

    function clusterRadius(size) {
      return Math.min(46, 5 + Math.sqrt(size) * 1.0);
    }

    function buildHotspots() {
      hotspotLayer.clearLayers();
      if (!state.showHotspots) return;
      DATA.hotspots.forEach(h => {
        const big = h.size > 1500;
        const marker = L.circleMarker([h.centroid_lat, h.centroid_lon], {
          radius: clusterRadius(h.size),
          color: RISK_COLOR[h.risk_level],
          weight: 1.4,
          fillColor: RISK_COLOR[h.risk_level],
          fillOpacity: big ? 0.16 : 0.42,
          dashArray: big ? '3,4' : null,
        });
        marker.bindPopup(`
      <div class="popup-title">${h.top_corridor.replace('non-corridor', 'Off named corridor')}</div>
      <div class="popup-row"><span>Risk level</span><b style="color:${RISK_COLOR[h.risk_level]}">${h.risk_level}</b></div>
      <div class="popup-row"><span>Incidents in cluster</span><b>${h.size.toLocaleString()}${big ? ' (chained, city-wide)' : ''}</b></div>
      <div class="popup-row"><span>Dominant cause</span><b>${(CAUSE_LABELS[h.dominant_cause] || h.dominant_cause)}</b></div>
      <div class="popup-row"><span>Closure rate</span><b>${(h.closure_rate * 100).toFixed(1)}%</b></div>
      <div class="popup-row"><span>Mean impact</span><b>${h.mean_impact.toFixed(1)}/10</b></div>
    `);
        hotspotLayer.addLayer(marker);
      });
    }

    // Filtering
    function filteredPoints() {
      return PTS.filter(p =>
        state.bands.has(p[SCHEMA.band]) &&
        (state.cause === 'all' || p[SCHEMA.cause] === state.cause)
      );
    }

    function currentFilterLabel() {
      const causeLabel = state.cause === 'all' ? 'All causes' : (CAUSE_LABELS[state.cause] || state.cause);
      const bandLabels = TIME_BANDS
        .filter(b => state.bands.has(b.id))
        .map(b => b.label)
        .join(', ');
      return `${causeLabel} | ${bandLabels || 'No time bands selected'}`;
    }

    function render() {
      const filtered = filteredPoints();
      buildHeat(filtered);
      document.getElementById('liveCount').innerHTML =
        `<b>${filtered.length.toLocaleString()}</b> / ${PTS.length.toLocaleString()} incidents shown<br>` +
        `<span>${currentFilterLabel()}</span>`;
      document.getElementById('timeCount').textContent = `${state.bands.size}/${TIME_BANDS.length} active`;
    }

    // Time band chips
    const timeChipsEl = document.getElementById('timeChips');
    TIME_BANDS.forEach(b => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (state.bands.has(b.id) ? ' active' : '');
      chip.dataset.id = b.id;
      chip.innerHTML = (b.peak ? '<span class="peak-dot"></span>' : '') + b.label;
      chip.onclick = () => {
        if (state.bands.has(b.id)) { state.bands.delete(b.id); chip.classList.remove('active'); }
        else { state.bands.add(b.id); chip.classList.add('active'); }
        render();
      };
      timeChipsEl.appendChild(chip);
    });
    document.getElementById('peakBtn').onclick = () => {
      state.bands = new Set(['early_morning', 'evening']);
      [...timeChipsEl.children].forEach(c => c.classList.toggle('active', state.bands.has(c.dataset.id)));
      render();
    };

    // Cause dropdown
    const causeCounts = {};
    PTS.forEach(p => { causeCounts[p[SCHEMA.cause]] = (causeCounts[p[SCHEMA.cause]] || 0) + 1; });
    const sortedCauses = Object.keys(causeCounts).sort((a, b) => causeCounts[b] - causeCounts[a]);
    const causeSelect = document.getElementById('causeSelect');
    causeSelect.innerHTML = `<option value="all">All causes (${PTS.length.toLocaleString()})</option>` +
      sortedCauses.map(c => `<option value="${c}">${(CAUSE_LABELS[c] || c)} (${causeCounts[c].toLocaleString()})</option>`).join('');
    causeSelect.onchange = () => { state.cause = causeSelect.value; render(); };

    // Layer toggles
    function bindSwitch(id, getVal, setVal, after) {
      const el = document.getElementById(id);
      el.classList.toggle('on', getVal());
      el.onclick = () => { setVal(!getVal()); el.classList.toggle('on', getVal()); after(); };
    }
    bindSwitch('toggleHotspots', () => state.showHotspots, v => state.showHotspots = v, buildHotspots);
    bindSwitch('toggleHeat', () => state.showHeat, v => state.showHeat = v, render);

    // Header stat chips
    const s = DATA.stats;
    document.getElementById('statRow').innerHTML = [
      [s.total_incidents.toLocaleString(), 'Incidents mapped'],
      [s.n_clusters, 'Hotspot clusters'],
      [s.clustered_pct + '%', 'Clustered'],
      [s.n_corridors_ranked, 'Corridors ranked'],
      [s.overall_closure_rate + '%', 'Closure baseline'],
    ].map(([v, l]) => `<div class="stat-chip"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');

    // Corridor list
    const corridorListEl = document.getElementById('corridorList');
    const corridorCentroids = {};
    DATA.corridors.forEach(c => {
      const pts = PTS.filter(p => p[SCHEMA.corridor] === c.corridor);
      const lat = pts.reduce((a, p) => a + p[SCHEMA.lat], 0) / pts.length;
      const lon = pts.reduce((a, p) => a + p[SCHEMA.lon], 0) / pts.length;
      corridorCentroids[c.corridor] = [lat, lon];
    });

    DATA.corridors.forEach((c, i) => {
      const isOff = c.corridor === 'non-corridor';
      const row = document.createElement('div');
      row.className = 'corridor-row' + (isOff ? ' muted' : '');
      row.innerHTML = `
    <div class="cr-top">
      <span><span class="cr-rank">#${i + 1}</span><span class="cr-name">${isOff ? 'Off named corridor' : c.corridor}</span></span>
      <span class="pill ${c.risk_tier}">${c.risk_tier}</span>
    </div>
    <div class="cr-bar-track"><div class="cr-bar-fill" style="width:${(c.risk_score * 100).toFixed(0)}%;background:${RISK_COLOR[c.risk_tier]}"></div></div>
    <div class="cr-meta">
      <span>${c.event_count.toLocaleString()} events</span>
      <span>closure ${(c.closure_rate * 100).toFixed(1)}%</span>
      <span>impact ${c.mean_impact.toFixed(1)}/10</span>
    </div>
  `;
      row.onclick = () => {
        const [lat, lon] = corridorCentroids[c.corridor];
        map.flyTo([lat, lon], 14, { duration: 0.8 });
        const pulse = L.circleMarker([lat, lon], { radius: 10, color: '#0B7A75', weight: 2, fillOpacity: 0 }).addTo(highlightLayer);
        let r = 10;
        const grow = setInterval(() => {
          r += 3; pulse.setRadius(r); pulse.setStyle({ opacity: Math.max(0, 1 - r / 60) });
          if (r > 60) { clearInterval(grow); highlightLayer.removeLayer(pulse); }
        }, 40);
      };
      corridorListEl.appendChild(row);
    });

    // Footnote
    document.getElementById('footnote').innerHTML =
      `Corridor table covers <b>${(100 - s.non_corridor_pct).toFixed(1)}%</b> of incidents. ` +
      `<b>${s.non_corridor_pct}%</b> occur off any named corridor. The heatmap itself, built on raw ` +
      `lat/long, still covers all ${s.total_incidents.toLocaleString()} incidents regardless.`;

    // Init
    buildHotspots();
    render();
  </script>
